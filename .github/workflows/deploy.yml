name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []   # Add test job here once test.yml is stable
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Store previous SHA for rollback
        id: prev_sha
        run: echo "sha=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/adaptive-rag-engine

            # Pull latest code
            git pull origin main

            # Build and restart only changed services (zero-downtime)
            docker compose pull
            docker compose up -d --build --no-deps api dashboard embedder reranker

            # Wait for API to be healthy
            echo "Waiting for API to be healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/api/health > /dev/null; then
                echo "API is healthy!"
                break
              fi
              echo "Attempt $i/30..."
              sleep 5
            done

            # Smoke tests
            docker compose exec -T api python -m pytest tests/smoke/ -v || {
              echo "Smoke tests failed — rolling back!"
              docker compose up -d --no-deps api:${{ steps.prev_sha.outputs.sha }}
              exit 1
            }

            echo "Deployment successful!"

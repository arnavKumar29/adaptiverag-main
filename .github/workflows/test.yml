name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: ragdb_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s

    env:
      DATABASE_URL: postgresql://rag:testpassword@localhost:5432/ragdb_test
      REDIS_URL: redis://localhost:6379
      WEAVIATE_URL: http://localhost:8080
      WEAVIATE_API_KEY: test-key
      OPENSEARCH_URL: http://localhost:9200
      OPENSEARCH_USER: admin
      OPENSEARCH_PASSWORD: admin
      EMBEDDER_URL: http://localhost:8001
      RERANKER_URL: http://localhost:8002
      OLLAMA_URL: http://localhost:11434
      OLLAMA_MODEL: qwen2.5:7b
      JWT_SECRET: test-secret-key-for-ci
      ENVIRONMENT: test
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v \
            --cov=api \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v \
            --timeout=60 \
            -k "not requires_gpu" \
            || echo "Integration tests need full stack — skipping in CI"

      - name: Check Alembic migrations are up-to-date
        run: |
          alembic check || echo "No pending migrations check (alembic may not be configured yet)"

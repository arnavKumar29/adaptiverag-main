services:
  # ─────────────────────────────────────────────
  # Reverse proxy
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - dashboard
    networks:
      - rag-internal
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Core API
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - WEAVIATE_URL=${WEAVIATE_URL}
      - WEAVIATE_API_KEY=${WEAVIATE_API_KEY}
      - OPENSEARCH_URL=${OPENSEARCH_URL}
      - OPENSEARCH_USER=${OPENSEARCH_USER}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
      - EMBEDDER_URL=${EMBEDDER_URL}
      - RERANKER_URL=${RERANKER_URL}
      - OLLAMA_URL=${OLLAMA_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - OLLAMA_FALLBACK_MODEL=${OLLAMA_FALLBACK_MODEL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - ENVIRONMENT=${ENVIRONMENT}
      - LOG_LEVEL=${LOG_LEVEL}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE}
      - SEMANTIC_CACHE_THRESHOLD=${SEMANTIC_CACHE_THRESHOLD}
    depends_on:
      - postgres
      - redis
      - weaviate
      - opensearch
      - embedder
      - reranker
      - jaeger
    networks:
      - rag-internal
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Dashboard
  # ─────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      - API_URL=http://api:8000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - api
      - postgres
    networks:
      - rag-internal
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # BGE-M3 Embedding microservice
  # ─────────────────────────────────────────────
  embedder:
    build:
      context: ./embedder
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=${REDIS_URL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_MODEL_VERSION=${EMBEDDING_MODEL_VERSION}
    volumes:
      - embedder-cache:/root/.cache/huggingface
    depends_on:
      - redis
    networks:
      - rag-internal
    restart: unless-stopped
    # Uncomment if you have an NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ─────────────────────────────────────────────
  # BGE Reranker microservice
  # ─────────────────────────────────────────────
  reranker:
    build:
      context: ./reranker
      dockerfile: Dockerfile
    environment:
      - RERANKER_MODEL=${RERANKER_MODEL}
    volumes:
      - reranker-cache:/root/.cache/huggingface
    networks:
      - rag-internal
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Ollama (local LLM)
  # ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - rag-internal
    restart: unless-stopped
    # GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ─────────────────────────────────────────────
  # Weaviate vector store
  # ─────────────────────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:1.24.0
    volumes:
      - weaviate-data:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: "${WEAVIATE_API_KEY}"
      AUTHENTICATION_APIKEY_USERS: "rag-user"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    networks:
      - rag-internal
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # OpenSearch (BM25 sparse retrieval)
  # ─────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "${OPENSEARCH_PASSWORD}"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - rag-internal
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    networks:
      - rag-internal
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - rag-internal
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Jaeger (distributed tracing)
  # ─────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # Jaeger UI (internal only in prod; expose for dev)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - rag-internal
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Prometheus
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - rag-internal
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Grafana
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD}"
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"   # Dev access; lock down behind Nginx in prod
    networks:
      - rag-internal
    restart: unless-stopped

volumes:
  weaviate-data:
  opensearch-data:
  postgres-data:
  redis-data:
  grafana-data:
  prometheus-data:
  embedder-cache:
  reranker-cache:
  ollama-data:

networks:
  rag-internal:
    name: rag-internal

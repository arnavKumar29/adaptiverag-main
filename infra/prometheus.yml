global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "rag-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "rag-embedder"
    static_configs:
      - targets: ["embedder:8001"]
    metrics_path: /metrics

  - job_name: "rag-reranker"
    static_configs:
      - targets: ["reranker:8002"]
    metrics_path: /metrics

  - job_name: "weaviate"
    static_configs:
      - targets: ["weaviate:2112"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

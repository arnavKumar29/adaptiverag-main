# ─────────────────────────────────────────────────────────────
# Nginx reverse proxy for Adaptive RAG Engine
# Routes: / → dashboard, /api → api, /metrics → api
# ─────────────────────────────────────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=ingest_limit:10m rate=20r/m;

# Upstream definitions
upstream rag_api {
    server api:8000;
    keepalive 32;
}

upstream rag_dashboard {
    server dashboard:8050;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    # ── Security headers ────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;" always;

    # ── Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        text/xml
        image/svg+xml;

    # ── Request size limits ─────────────────────────────
    client_max_body_size 50m;
    client_body_buffer_size 10m;

    # ── Timeouts ────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
    send_timeout 120s;

    # ── Health check (for load balancers) ───────────────
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── API routes ──────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://rag_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Connection reuse
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Ingest endpoint (lower rate limit) ──────────────
    location /api/ingest {
        limit_req zone=ingest_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://rag_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Metrics endpoint ────────────────────────────────
    location /metrics {
        # In production, restrict to internal IPs
        # allow 10.0.0.0/8;
        # deny all;

        proxy_pass http://rag_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── API docs ────────────────────────────────────────
    location /docs {
        proxy_pass http://rag_api;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /redoc {
        proxy_pass http://rag_api;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /openapi.json {
        proxy_pass http://rag_api;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ── Dashboard (default) ─────────────────────────────
    location / {
        proxy_pass http://rag_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for HTMX
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

